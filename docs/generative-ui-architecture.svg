<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1080" font-family="'IBM Plex Sans Thai Looped','Inter',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1080" fill="#fafafb"/>

  <!-- Title block -->
  <text x="60" y="50" font-size="22" font-weight="700" fill="#1f1f1f">Generative UI — Dashboard Flow</text>
  <text x="60" y="74" font-size="13" fill="#64748b">หมอเมย์ × ehp-cis × A2UI v0.8 · Gemma 3 27B (self-hosted vLLM) · HeroUI render</text>

  <!-- Legend -->
  <g transform="translate(900, 32)" font-size="11" fill="#1f1f1f">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#f5e7ff" stroke="#aa7edf" stroke-width="1.5"/>
    <text x="20" y="11">User</text>
    <rect x="65" y="0" width="14" height="14" rx="3" fill="#e5f0ff" stroke="#3485ff" stroke-width="1.5"/>
    <text x="85" y="11">Frontend</text>
    <rect x="160" y="0" width="14" height="14" rx="3" fill="#fff3d6" stroke="#d97706" stroke-width="1.5"/>
    <text x="180" y="11">Service</text>
    <rect x="250" y="0" width="14" height="14" rx="3" fill="#ffe4e6" stroke="#f43f5e" stroke-width="1.5"/>
    <text x="270" y="11">LLM</text>
    <rect x="320" y="0" width="14" height="14" rx="3" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="340" y="11">Data store</text>
    <rect x="425" y="0" width="14" height="14" rx="3" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="445" y="11">Result</text>
  </g>

  <!-- ===================== Main vertical flow (center column) ===================== -->

  <!-- 1. USER prompt -->
  <g filter="url(#softShadow)">
    <rect x="450" y="110" width="500" height="78" rx="14" fill="#f5e7ff" stroke="#aa7edf" stroke-width="1.5"/>
  </g>
  <text x="468" y="138" font-size="13" font-weight="700" fill="#5b21b6">USER · พิมพ์ใน prompt bar</text>
  <text x="468" y="162" font-size="14" fill="#1f1f1f">"สร้างหน้าแดชบอร์ดสรุปผลสุขภาพของคุณสมชาย"</text>
  <text x="468" y="180" font-size="11" fill="#64748b">/dashboard · GenerativeDashboard.tsx</text>

  <!-- arrow 1->2 -->
  <line x1="700" y1="188" x2="700" y2="232" stroke="#1f1f1f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. INTENT + RESOLVER -->
  <g filter="url(#softShadow)">
    <rect x="450" y="240" width="500" height="100" rx="14" fill="#fff3d6" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <text x="468" y="268" font-size="13" font-weight="700" fill="#9a3412">① Intent router · Patient resolver</text>
  <text x="468" y="290" font-size="12" fill="#1f1f1f">• แยก intent = "build dashboard" · subject = "ผู้ป่วย"</text>
  <text x="468" y="308" font-size="12" fill="#1f1f1f">• Fuzzy search ชื่อ "สมชาย" → HN-2025-001</text>
  <text x="468" y="326" font-size="11" fill="#64748b">services/generative/resolvePatient.ts</text>

  <!-- arrow 2->3 -->
  <line x1="700" y1="340" x2="700" y2="384" stroke="#1f1f1f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. DATA FETCHER -->
  <g filter="url(#softShadow)">
    <rect x="450" y="392" width="500" height="124" rx="14" fill="#fff3d6" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <text x="468" y="420" font-size="13" font-weight="700" fill="#9a3412">② Data fetcher · ดึงข้อมูลที่เกี่ยวข้อง</text>
  <text x="468" y="442" font-size="12" fill="#1f1f1f">• Patient profile · demographics · allergy · chronic</text>
  <text x="468" y="460" font-size="12" fill="#1f1f1f">• Vitals trend 90 วัน · BP / HR / Weight / BMI</text>
  <text x="468" y="478" font-size="12" fill="#1f1f1f">• Visit history · prescriptions · lab results · ICD codes</text>
  <text x="468" y="502" font-size="11" fill="#64748b">services/generative/fetchPatientContext.ts</text>

  <!-- right branch arrows: fetcher → data stores -->
  <path d="M 950 454 C 1010 454, 1010 488, 1050 488" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowMuted)"/>
  <path d="M 950 454 C 1010 454, 1010 420, 1050 420" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowMuted)"/>

  <!-- Data stores (right side) -->
  <g filter="url(#softShadow)">
    <rect x="1050" y="394" width="290" height="56" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  </g>
  <text x="1066" y="416" font-size="12" font-weight="700" fill="#065f46">Supabase · public.patients</text>
  <text x="1066" y="436" font-size="11" fill="#64748b">cloud · persisted across sessions</text>

  <g filter="url(#softShadow)">
    <rect x="1050" y="462" width="290" height="56" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  </g>
  <text x="1066" y="484" font-size="12" font-weight="700" fill="#065f46">patientStore · localStorage</text>
  <text x="1066" y="504" font-size="11" fill="#64748b">offline-safe · cached profile + visits</text>

  <!-- arrow 3->4 -->
  <line x1="700" y1="516" x2="700" y2="560" stroke="#1f1f1f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. PROMPT BUILDER -->
  <g filter="url(#softShadow)">
    <rect x="450" y="568" width="500" height="130" rx="14" fill="#fff3d6" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <text x="468" y="596" font-size="13" font-weight="700" fill="#9a3412">③ Prompt builder · ประกอบ context</text>
  <text x="468" y="618" font-size="12" fill="#1f1f1f">• system: A2UI catalog spec + dashboard task instructions</text>
  <text x="468" y="636" font-size="12" fill="#1f1f1f">• data: ผลข้อมูลที่ fetch แล้ว → inject เข้า `data` map</text>
  <text x="468" y="654" font-size="12" fill="#1f1f1f">• user: ข้อความเดิมของผู้ใช้</text>
  <text x="468" y="672" font-size="12" fill="#475569">→ บังคับ json_object · temperature 0.2 · ห้ามแต่งข้อมูล</text>
  <text x="468" y="690" font-size="11" fill="#64748b">services/a2ui/catalog.ts + services/generative/buildPrompt.ts</text>

  <!-- arrow 4->5 -->
  <line x1="700" y1="698" x2="700" y2="742" stroke="#1f1f1f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. LLM -->
  <g filter="url(#softShadow)">
    <rect x="450" y="750" width="500" height="92" rx="14" fill="#ffe4e6" stroke="#f43f5e" stroke-width="1.5"/>
  </g>
  <text x="468" y="778" font-size="13" font-weight="700" fill="#9f1239">④ Gemma 3 27B · vLLM (self-hosted)</text>
  <text x="468" y="800" font-size="12" fill="#1f1f1f">OpenAI-compatible /v1/chat/completions · stream=false</text>
  <text x="468" y="818" font-size="12" fill="#1f1f1f">response_format = json_object · ออก A2UI JSON</text>
  <text x="468" y="836" font-size="11" fill="#64748b">services/ai/llm.ts</text>

  <!-- arrow 5->6 -->
  <line x1="700" y1="842" x2="700" y2="886" stroke="#1f1f1f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. VALIDATE -->
  <g filter="url(#softShadow)">
    <rect x="450" y="894" width="500" height="68" rx="14" fill="#fff3d6" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <text x="468" y="922" font-size="13" font-weight="700" fill="#9a3412">⑤ validateA2UIResponse</text>
  <text x="468" y="942" font-size="12" fill="#1f1f1f">type-check · ID uniqueness · root reachable · fallback ถ้าพัง</text>
  <text x="468" y="958" font-size="11" fill="#64748b">services/a2ui/types.ts</text>

  <!-- arrow 6->7 -->
  <line x1="700" y1="962" x2="700" y2="1006" stroke="#1f1f1f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. RENDER -->
  <g filter="url(#softShadow)">
    <rect x="450" y="1010" width="500" height="50" rx="14" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  </g>
  <text x="468" y="1032" font-size="13" font-weight="700" fill="#5b21b6">⑥ A2UIRenderer → HeroUI</text>
  <text x="468" y="1050" font-size="11" fill="#64748b">metric · line-chart · bar-chart · timeline · chip-group · section</text>

  <!-- ===================== Left side annotations ===================== -->

  <!-- A2UI catalog block (connects to 4) -->
  <g filter="url(#softShadow)">
    <rect x="60" y="568" width="340" height="130" rx="14" fill="#e5f0ff" stroke="#3485ff" stroke-width="1.5"/>
  </g>
  <text x="78" y="596" font-size="13" font-weight="700" fill="#1e3a8a">A2UI catalog (extended)</text>
  <text x="78" y="618" font-size="12" fill="#1f1f1f">section · stack · row · heading · text</text>
  <text x="78" y="636" font-size="12" fill="#1f1f1f">stat-card · metric-grid · info-row · chip-group</text>
  <text x="78" y="654" font-size="12" fill="#1f1f1f"><tspan font-weight="600">+ line-chart · bar-chart · timeline</tspan> (ใหม่)</text>
  <text x="78" y="672" font-size="11" fill="#64748b">SVG inline · no chart-lib dep</text>
  <text x="78" y="690" font-size="11" fill="#64748b">JSON-first → auditable + replayable</text>
  <!-- arrow catalog -> prompt builder -->
  <path d="M 400 632 C 425 632, 425 632, 449 632" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowMuted)"/>

  <!-- Prompt bar wireframe (left of 1) -->
  <g filter="url(#softShadow)">
    <rect x="60" y="108" width="340" height="82" rx="14" fill="#e5f0ff" stroke="#3485ff" stroke-width="1.5"/>
  </g>
  <text x="78" y="134" font-size="13" font-weight="700" fill="#1e3a8a">Frontend layer</text>
  <text x="78" y="156" font-size="12" fill="#1f1f1f">• PromptBar (BorderGlow + mic)</text>
  <text x="78" y="174" font-size="12" fill="#1f1f1f">• A2UIRenderer mount-point</text>
  <path d="M 400 152 C 425 152, 425 152, 449 152" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowMuted)"/>

  <!-- Streaming + cache note (right of LLM) -->
  <g filter="url(#softShadow)">
    <rect x="1000" y="750" width="340" height="92" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <text x="1018" y="776" font-size="12" font-weight="700" fill="#334155">Performance · safety hooks</text>
  <text x="1018" y="798" font-size="11" fill="#475569">• cache layout JSON by (intent + HN + day)</text>
  <text x="1018" y="816" font-size="11" fill="#475569">• PII redaction before model · audit log</text>
  <text x="1018" y="834" font-size="11" fill="#475569">• retry-with-repair ถ้า schema พัง</text>

  <!-- Render result preview (right of 7) -->
  <g filter="url(#softShadow)">
    <rect x="1000" y="930" width="340" height="130" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <text x="1018" y="954" font-size="12" font-weight="700" fill="#334155">User sees</text>
  <!-- mini mockup -->
  <rect x="1018" y="966" width="100" height="36" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="1024" y="982" font-size="9" fill="#4c1d95">BP avg</text>
  <text x="1024" y="996" font-size="13" font-weight="700" fill="#1f1f1f">128/82</text>
  <rect x="1126" y="966" width="100" height="36" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="1132" y="982" font-size="9" fill="#065f46">Weight</text>
  <text x="1132" y="996" font-size="13" font-weight="700" fill="#1f1f1f">68.2 kg</text>
  <rect x="1234" y="966" width="100" height="36" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1240" y="982" font-size="9" fill="#9a3412">Visits 90d</text>
  <text x="1240" y="996" font-size="13" font-weight="700" fill="#1f1f1f">5</text>
  <!-- mini line chart -->
  <rect x="1018" y="1012" width="316" height="40" rx="6" fill="#fafafb" stroke="#e2e8f0"/>
  <polyline points="1028,1042 1058,1034 1088,1038 1118,1028 1148,1030 1178,1022 1208,1024 1238,1020 1268,1014 1298,1018 1324,1014" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
</svg>
