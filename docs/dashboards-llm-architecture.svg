<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="'Google Sans', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a" />
    </marker>
    <linearGradient id="llmFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef4ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="dataFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5" />
      <stop offset="100%" stop-color="#d1fae5" />
    </linearGradient>
    <linearGradient id="validFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="100%" stop-color="#fef3c7" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="2" result="off" />
      <feComponentTransfer><feFuncA type="linear" slope="0.18" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="640" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Generative Dashboards — LLM Architecture</text>
  <text x="640" y="66" text-anchor="middle" font-size="13" fill="#475569">LLM picks UI from catalog · Data from aggregators · Never fabricates</text>

  <!-- ── 1. User Prompt ── -->
  <g filter="url(#soft)">
    <rect x="40" y="110" width="200" height="100" rx="14" fill="#ffffff" stroke="#94a3b8" />
    <text x="140" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">USER</text>
    <text x="140" y="162" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Prompt (TH/EN)</text>
    <text x="140" y="183" text-anchor="middle" font-size="11" fill="#475569">"สรุปผู้ป่วยสมชาย ใจดี"</text>
    <text x="140" y="198" text-anchor="middle" font-size="11" fill="#475569">"no-show 30 วัน"</text>
  </g>

  <!-- arrow user → llm -->
  <line x1="240" y1="160" x2="320" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ── 2. LLM ── -->
  <g filter="url(#soft)">
    <rect x="320" y="100" width="320" height="290" rx="16" fill="url(#llmFill)" stroke="#3b82f6" />
    <text x="480" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">LLM (vllm-qwen.bmscloud.in.th)</text>
    <text x="480" y="146" text-anchor="middle" font-size="11" fill="#1e40af" opacity="0.8">chatJSON · response_format: json_object</text>

    <line x1="340" y1="158" x2="620" y2="158" stroke="#3b82f6" stroke-opacity="0.3" />

    <text x="338" y="180" font-size="12" font-weight="600" fill="#1e40af">System prompt embeds:</text>
    <text x="348" y="200" font-size="11" fill="#1e3a8a">• DATA_SOURCES catalog (29 ids + dims + measures)</text>
    <text x="348" y="218" font-size="11" fill="#1e3a8a">• WIDGET_KINDS: kpi / line / bar / table / info</text>
    <text x="348" y="236" font-size="11" fill="#1e3a8a">• Source → widget compatibility matrix</text>
    <text x="348" y="254" font-size="11" fill="#1e3a8a">• Per-patient filter rules (patient_name / patient_hn)</text>
    <text x="348" y="272" font-size="11" fill="#1e3a8a">• Few-shot examples (OPD, DM trend, patient summary)</text>

    <rect x="338" y="288" width="284" height="84" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-opacity="0.5" />
    <text x="348" y="306" font-size="11" font-weight="700" fill="#dc2626">CRITICAL RULES</text>
    <text x="348" y="322" font-size="10.5" fill="#0f172a">• Never invent source id (validator rejects)</text>
    <text x="348" y="338" font-size="10.5" fill="#0f172a">• Never invent numeric values or labels</text>
    <text x="348" y="354" font-size="10.5" fill="#0f172a">• If no source fits → emit ONE info widget</text>
    <text x="348" y="368" font-size="10.5" fill="#0f172a">  explaining what's missing + suggest rephrase</text>
  </g>

  <!-- LLM output -->
  <text x="480" y="412" text-anchor="middle" font-size="11" fill="#64748b">↓ Dashboard JSON {widgets[]}</text>
  <line x1="480" y1="420" x2="480" y2="450" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ── 3. Validator ── -->
  <g filter="url(#soft)">
    <rect x="320" y="450" width="320" height="130" rx="16" fill="url(#validFill)" stroke="#d97706" />
    <text x="480" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">validateDashboard()</text>
    <text x="338" y="504" font-size="11" fill="#78350f">✓ source ∈ DATA_SOURCES</text>
    <text x="338" y="522" font-size="11" fill="#78350f">✓ kind ↔ source shape (kpi/points/rows)</text>
    <text x="338" y="540" font-size="11" fill="#78350f">✓ info widget has "message"</text>
    <text x="338" y="558" font-size="11" fill="#78350f">✓ layout col+w ≤ 5, row ≥ 1</text>
  </g>

  <!-- Validator → pass / fail -->
  <line x1="480" y1="582" x2="480" y2="640" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="492" y="615" font-size="11" font-weight="600" fill="#15803d">PASS</text>

  <!-- Fail path arrow to fallback -->
  <path d="M 320 515 Q 220 515 220 700" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)" />
  <text x="146" y="568" font-size="11" font-weight="600" fill="#b91c1c">FAIL or LLM</text>
  <text x="146" y="582" font-size="11" font-weight="600" fill="#b91c1c">unreachable</text>

  <!-- Fallback box -->
  <g filter="url(#soft)">
    <rect x="40" y="680" width="200" height="100" rx="14" fill="#fef2f2" stroke="#dc2626" />
    <text x="140" y="708" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">unavailableDashboard()</text>
    <text x="140" y="730" text-anchor="middle" font-size="11" fill="#7f1d1d">Single info widget</text>
    <text x="140" y="746" text-anchor="middle" font-size="11" fill="#7f1d1d">"LLM ไม่พร้อมใช้งาน"</text>
    <text x="140" y="762" text-anchor="middle" font-size="11" fill="#7f1d1d">+ reason</text>
    <text x="140" y="776" text-anchor="middle" font-size="10" fill="#7f1d1d" opacity="0.7">No keyword fallback</text>
  </g>

  <!-- ── 4. Renderer ── -->
  <g filter="url(#soft)">
    <rect x="320" y="640" width="320" height="130" rx="16" fill="#ffffff" stroke="#0f172a" />
    <text x="480" y="668" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">WidgetRenderer</text>
    <text x="480" y="688" text-anchor="middle" font-size="11" fill="#475569">For each widget:</text>
    <text x="480" y="706" text-anchor="middle" font-size="11" fill="#0f172a">queryDataSource(source, {groupBy, metric, filters})</text>
    <text x="480" y="726" text-anchor="middle" font-size="11" fill="#475569">→ KPI / LineChart / BarChart / Table / Info</text>
    <text x="480" y="752" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Inline SVG charts — no chart library</text>
  </g>

  <!-- Renderer → queryDataSource → data layer -->
  <line x1="640" y1="705" x2="730" y2="705" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ── 5. Data layer ── -->
  <g filter="url(#soft)">
    <rect x="730" y="100" width="510" height="670" rx="16" fill="url(#dataFill)" stroke="#16a34a" />
    <text x="985" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Data Sources (catalog.ts) · 29 ids</text>
    <text x="985" y="146" text-anchor="middle" font-size="11" fill="#166534" opacity="0.85">queryDataSource(source, options) — ONE switch, all real aggregators</text>

    <!-- Source group 1: Appointments / operational -->
    <rect x="746" y="166" width="232" height="190" rx="10" fill="#ffffff" stroke="#22c55e" stroke-opacity="0.5" />
    <text x="758" y="186" font-size="11" font-weight="700" fill="#15803d">Operational</text>
    <text x="758" y="206" font-size="10.5" fill="#0f172a">appointments.today / .trend</text>
    <text x="758" y="222" font-size="10.5" fill="#0f172a">operational.queue</text>
    <text x="758" y="238" font-size="10.5" fill="#0f172a">operational.no_show_rate</text>
    <text x="758" y="254" font-size="10.5" fill="#0f172a">operational.no_show_trend</text>
    <text x="758" y="270" font-size="10.5" fill="#0f172a">operational.slot_utilization</text>
    <text x="758" y="286" font-size="10.5" fill="#0f172a">no_show.list</text>
    <text x="758" y="312" font-size="10" fill="#475569" font-style="italic">↓ pull from</text>
    <text x="758" y="328" font-size="10.5" font-weight="600" fill="#15803d">operational.ts</text>
    <text x="758" y="344" font-size="10" fill="#166534">TODAY_APPOINTMENTS · NO_SHOW_HISTORY</text>

    <!-- Source group 2: Cohort clinical -->
    <rect x="992" y="166" width="232" height="190" rx="10" fill="#ffffff" stroke="#22c55e" stroke-opacity="0.5" />
    <text x="1004" y="186" font-size="11" font-weight="700" fill="#15803d">Cohort clinical</text>
    <text x="1004" y="206" font-size="10.5" fill="#0f172a">patients.active / .list / .insurance</text>
    <text x="1004" y="222" font-size="10.5" fill="#0f172a">patients.risk / .missed</text>
    <text x="1004" y="238" font-size="10.5" fill="#0f172a">medications.top</text>
    <text x="1004" y="254" font-size="10.5" fill="#0f172a">labs.hba1c_trend / ldl / creatinine</text>
    <text x="1004" y="270" font-size="10.5" fill="#0f172a">vitals.systolic_trend</text>
    <text x="1004" y="286" font-size="10.5" fill="#0f172a">visits.volume_by_month / top_complaints</text>
    <text x="1004" y="302" font-size="10.5" fill="#0f172a">visits.by_clinic / wait_time_by_clinic</text>
    <text x="1004" y="316" font-size="10.5" fill="#0f172a">lab_results.recent</text>
    <text x="1004" y="338" font-size="10" fill="#475569" font-style="italic">↓ aggregators in clinical.ts</text>

    <!-- Source group 3: Per-patient -->
    <rect x="746" y="376" width="478" height="200" rx="10" fill="#ffffff" stroke="#22c55e" stroke-opacity="0.5" />
    <text x="758" y="396" font-size="11" font-weight="700" fill="#15803d">Per-patient (REQUIRES filters)</text>
    <text x="758" y="412" font-size="10.5" fill="#0f172a">patient.profile / .diagnoses / .medications / .visits</text>
    <text x="758" y="428" font-size="10.5" fill="#0f172a">patient.vitals_trend (metric: systolic | bmi | ...)</text>
    <text x="758" y="444" font-size="10.5" fill="#0f172a">patient.labs_trend (metric: HbA1c | LDL | ...)</text>
    <text x="758" y="460" font-size="10.5" fill="#0f172a">patient.risk_kpi</text>

    <rect x="758" y="476" width="450" height="86" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-opacity="0.6" />
    <text x="768" y="495" font-size="10.5" font-weight="700" fill="#15803d">resolvePatient(filters)</text>
    <text x="768" y="511" font-size="10" fill="#166534">filters.patient_id → PATIENTS.find(id)</text>
    <text x="768" y="525" font-size="10" fill="#166534">filters.patient_hn → PATIENTS.find(hn)</text>
    <text x="768" y="539" font-size="10" fill="#166534">filters.patient_name → loose match (strip prefix + whitespace)</text>
    <text x="768" y="553" font-size="10" fill="#dc2626">Miss → returns "ไม่พบผู้ป่วย" row (never fabricated)</text>

    <!-- Backing data -->
    <rect x="746" y="598" width="478" height="156" rx="10" fill="#dcfce7" stroke="#15803d" />
    <text x="985" y="618" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Backing mock data (deterministic, seeded RNG)</text>

    <text x="760" y="640" font-size="10.5" font-weight="600" fill="#14532d">patients.ts</text>
    <text x="760" y="656" font-size="10" fill="#166534">PATIENTS[25] — id, HN, dx, meds, labs, vitals, risk flags</text>

    <text x="760" y="678" font-size="10.5" font-weight="600" fill="#14532d">clinical.ts</text>
    <text x="760" y="694" font-size="10" fill="#166534">LAB_HISTORY · VITAL_HISTORY · VISIT_HISTORY</text>
    <text x="760" y="708" font-size="10" fill="#166534">12-mo time series per patient · 8-14 visits per patient</text>

    <text x="760" y="730" font-size="10.5" font-weight="600" fill="#14532d">operational.ts</text>
    <text x="760" y="746" font-size="10" fill="#166534">TODAY_APPOINTMENTS (~157) · NO_SHOW_HISTORY (30d)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 280)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1" />
    <text x="10" y="20" font-size="11" font-weight="700" fill="#0f172a">Path legend</text>
    <line x1="10" y1="38" x2="40" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
    <text x="48" y="42" font-size="10.5" fill="#0f172a">normal flow</text>
    <line x1="10" y1="58" x2="40" y2="58" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)" />
    <text x="48" y="62" font-size="10.5" fill="#0f172a">validated pass</text>
    <line x1="10" y1="78" x2="40" y2="78" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)" />
    <text x="48" y="82" font-size="10.5" fill="#0f172a">reject / unreachable</text>
    <text x="10" y="106" font-size="10" fill="#475569">No widget is composed without</text>
    <text x="10" y="118" font-size="10" fill="#475569">passing through the LLM path.</text>
  </g>
</svg>
