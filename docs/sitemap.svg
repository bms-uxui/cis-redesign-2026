    <text x="740" y="142" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">EHP-CIS</text>
    <text x="740" y="160" text-anchor="middle" font-size="11" fill="#dbeafe">App Shell · Sidebar · TopBar · Tabs</text>
  </g>

  <!-- Branches from root -->
