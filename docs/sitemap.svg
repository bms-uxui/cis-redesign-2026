<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 980" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai Looped',sans-serif">
  <!-- ─────────────── Defs ─────────────── -->
  <defs>
    <linearGradient id="g-root" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3485ff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1480" height="980" fill="#f8fafc"/>

  <!-- ─────────────── Title ─────────────── -->
  <text x="40" y="48" font-size="22" font-weight="700" fill="#0f172a">EHP-CIS · Sitemap</text>
  <text x="40" y="72" font-size="13" fill="#64748b">All routes &amp; navigation surfaces · v.2026</text>

  <!-- Legend -->
  <g transform="translate(900, 32)" font-size="11" fill="#475569">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#3485ff"/><text x="22" y="11">Entry</text>
    <rect x="80" y="0" width="14" height="14" rx="3" fill="#8b5cf6"/><text x="102" y="11">Workspace (panel)</text>
    <rect x="240" y="0" width="14" height="14" rx="3" fill="#10b981"/><text x="262" y="11">Insights</text>
    <rect x="340" y="0" width="14" height="14" rx="3" fill="#f59e0b"/><text x="362" y="11">Operations</text>
    <rect x="445" y="0" width="14" height="14" rx="3" fill="#64748b"/><text x="467" y="11">Utility</text>
    <rect x="510" y="0" width="14" height="14" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-dasharray="3 2"/><text x="532" y="11">Modal / Overlay</text>
  </g>

  <!-- ─────────────── Root ─────────────── -->
