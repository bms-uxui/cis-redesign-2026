    <path d="M 740 174 C 740 200, 440 200, 440 230"/>
    <path d="M 740 174 C 740 200, 720 200, 720 230"/>
    <path d="M 740 174 C 740 200, 1000 200, 1000 230"/>
    <path d="M 740 174 C 740 200, 1280 200, 1280 230"/>
