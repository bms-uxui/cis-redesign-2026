      <text x="14" y="22" font-size="13" font-weight="600" fill="#0f172a">All Menus</text>
      <text x="14" y="40" font-size="11" font-family="monospace" fill="#3485ff">/menus</text>
      <text x="190" y="40" text-anchor="end" font-size="10" fill="#94a3b8">AllMenus</text>
    </g>
    <g transform="translate(0, 152)" filter="url(#soft)">
