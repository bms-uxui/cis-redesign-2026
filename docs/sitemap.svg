      <text x="14" y="18" font-size="12" fill="#0f172a">Patient by HN</text>
      <text x="14" y="34" font-size="10" font-family="monospace" fill="#8b5cf6">/opd/:hn</text>
      <text x="190" y="34" text-anchor="end" font-size="9" font-style="italic" fill="#94a3b8">dynamic</text>
