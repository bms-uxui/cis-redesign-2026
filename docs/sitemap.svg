        <text x="14" y="22" font-size="13" font-weight="600" fill="#0f172a">Dictation Island</text>
        <text x="14" y="38" font-size="10" fill="#64748b">Live-caption pill</text>
        <text x="14" y="52" font-size="10" fill="#64748b">tab / mic audio</text>
