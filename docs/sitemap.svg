      <text x="14" y="22" font-size="13" font-weight="600" fill="#0f172a">ระเบียนผู้ป่วยนอก</text>
      <text x="14" y="40" font-size="10" fill="#7c3aed">panel · 6 items</text>
    </g>
    <!-- children of OPD -->
